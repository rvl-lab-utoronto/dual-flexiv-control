defaults:
  - base_control
  - _self_

# Joint velocity control. flexivrdk 1.8 has NO joint-velocity mode; velocity is
# realized in NRT_JOINT_POSITION by integrating the commanded dq_d into q_d each
# tick (the arm integrates, starting from its measured q). The brain posts dq_d only.
kind: qvel
mode: NRT_JOINT_POSITION
send_fn: SendJointPosition
command:
  q_d: 7               # integrated target positions [rad] (arm-integrated)
  dq_d: 7              # commanded joint velocities   [rad/s] (primary)
  dq_max: 7
  ddq_max: 7
streamed: [dq_d]       # brain posts velocity; arm integrates to q_d (dim 7)
