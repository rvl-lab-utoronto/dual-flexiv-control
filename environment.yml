# Conda environment for dual-flexiv-control.
#   Create:  conda env create -f environment.yml
#   Update:  conda env update -f environment.yml --prune
#   Then:    conda run -n dual-flexiv-control pip install -e .
#
# Python is pinned to 3.12: flexivrdk 1.8.0 publishes a manylinux_2_31 x86_64
# wheel for it (cp38/cp310/cp312 exist), and 3.12 has the most mature
# scientific-Python ecosystem and full multiprocessing.shared_memory support,
# which is the backbone of this project.
name: dual-flexiv-control
channels:
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      - numpy>=2.0
      - flexivrdk==1.8.0
      - -e .
